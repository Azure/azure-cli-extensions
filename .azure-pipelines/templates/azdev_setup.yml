parameters:
  - name: CLIRepoPath
    type: string
    default: '../azure-cli'
  - name: CLIExtensionRepoPath
    type: string
    default: './'
steps:
  - bash: |
      set -ev
      python -m venv env
      chmod +x env/bin/activate
      source ./env/bin/activate
      # clone azure-cli
      git clone -q --single-branch -b dev https://github.com/Azure/azure-cli.git ../azure-cli
      python -m pip install -U pip
      # azdev 0.2.11b1 (decouples extension metadata from wheel==0.30.0) tho it is not on PyPI yet.
      # Pinned to a specific azure-cli-dev-tools commit (not @dev) for reproducible builds
      # until the pre-release is published; then switch this back to:
      # pip install --upgrade "azdev==0.2.11b1"
      pip install --upgrade "git+https://github.com/Azure/azure-cli-dev-tools.git@644d296d9ca9b322b438d5ca21141b247258d0e5#egg=azdev"
      azdev --version
      azdev setup -c $CLI_REPO_PATH -r $CLI_EXT_REPO_PATH --debug
      pip list -v
      az --version
    displayName: 'azdev setup'
    env:
      CLI_REPO_PATH: ${{ parameters.CLIRepoPath }}
      CLI_EXT_REPO_PATH: ${{ parameters.CLIExtensionRepoPath }}