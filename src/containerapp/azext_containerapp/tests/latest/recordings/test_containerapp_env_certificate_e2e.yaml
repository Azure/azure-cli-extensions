        LIABILITY IN SUCH JURISDICTIONS SHALL BE LIMITED TO THE SMALLEST AMOUNT PERMITTED
        BY LAW.<br />\\n<br />\\nYOU FURTHER UNDERSTAND AND AGREE THAT <span style=\\\"text-transform:uppercase;\\\">Azure</span>
        DISCLAIMS ANY LOSS OR LIABILITY RESULTING FROM:<ol type=i><li>THE INADVERTENT
        DISCLOSURE OR THEFT OF YOUR PERSONAL INFORMATION;</li><li>ACCESS DELAYS OR
        INTERRUPTIONS TO OUR WEBSITE OR THE WEBSITES OF OUR AFFILIATED REGISTRARS;</li><li>DATA
        NON-DELIVERY OF MIS-DELIVERY BETWEEN YOU AND <span style=\\\"text-transform:uppercase;\\\">Azure</span>;</li><li>THE
        FAILURE FOR WHATEVER REASON TO RENEW A PRIVATE DOMAIN NAME REGISTRATION;</li><li>THE
        UNAUTHORIZED USE OF YOUR <span style=\\\"text-transform:uppercase;\\\">Azure</span>
        ACCOUNT OR ANY OF DBP SERVICES;</li><li>ERRORS, OMISSIONS OR MISSTATEMENTS
        BY <span style=\\\"text-transform:uppercase;\\\">Azure</span>;</li><li>DELETION
        OF, FAILURE TO STORE, FAILURE TO PROCESS OR ACT UPON EMAIL MESSAGES FORWARDED
        TO EITHER YOU OR YOUR PRIVATE DOMAIN NAME REGISTRATION;</li><li>PROCESSING
        OF UPDATED INFORMATION REGARDING YOUR <span style=\\\"text-transform:uppercase;\\\">Azure</span>
        ACCOUNT; AND/OR</li><li>ANY ACT OR OMISSION CAUSED BY YOU OR YOUR AGENTS (WHETHER
        AUTHORIZED BY YOU OR NOT).</li></ol></p>\\n</p>\\n        <strong><strong>7
        . INDEMNITY</strong>   </strong>\\n\\n  <p>You agree to release, defend, indemnify
