        Name Proxy Agreement</a>.</p>\\n</p>\\n      <p><strong>Ultimate Domain Protection
        &amp; Security</strong>. The privacy and business protection service includes
        all the features of Full Domain Privacy and Protection, plus the service generally
        allows You to: (i) prevent accidental loss of a domain name due to an expired
        credit card or invalid payment method when domain is set on auto-renew; (ii)
        lock your domain name in your account; and (iii) activate Website Security
        Basic. The privacy and business protection service features are intended to:
        prevent domain-related spam; protect your identity from third-parties; plus
        add a higher level of security through 2-Step Verification to disallow most
        accidental or malicious domain name transfers;; and provide domain name protection
        through Website Security Basic. As set forth in Section 2(xi) of this Agreement,
        You acknowledge and agree that you may not be permitted to purchase private
        or proxy TLD registrations in certain markets, countries and territories or
        for certain TLDs. Your purchase and use of Ultimate Domain Protection &amp;
        Security is also governed by terms of the  <a href=\\\"https://www.secureserver.net/legal/agreements/domain-name-proxy-agreement?prog_id=510456&pl_id=510456&plid=510456\\\">Domain
        Name Proxy Agreement</a> and <a href=\\\"https://www.secureserver.net/legal/agreements/website-security-terms-of-use?prog_id=510456&pl_id=510456&plid=510456\\\">Website
        Security Terms of Use</a></p>\\n      <p><p><strong>Trademark Keeper (Beta)</strong>
        Trademark Keeper is a free beta feature of your domain that (i) automatically
        captures a record of Your homepage including any trademarks on that homepage
        quarterly (\u201CScreen Capture(s)\u201D), and (ii) timestamps and records
        proof of the Screen Capture(s) using blockchain technology to ensure that
        the record is secure. Trademark Keeper also allows You to identify up to three
        (3) individual trademarks to help You catalog Your brand assets in Your dashboard.
        Trademark Keeper stores the Screen Capture(s) on servers provisioned by Azure
        but does not analyze, modify or edit the Screen Capture(s). Trademark Keeper
        stores a digital signature of the Screen Captures on a blockchain proving
        the Screen Captures\u2019 existence at a certain time, but does not store
        the Screen Capture itself on the blockchain. You may request a report that
        shows a historical record of Screen Captures that have been captured by Trademark
        Keeper. At any time, You may opt out of Trademark Keeper and delete the historical
        record of Screen Captures. Your Screen Captures will be deleted 24 hours after
        You disable the \u201CKeep My Data\u201D function. If you re-enable this function
        within 24 hours, your Screen Captures may be restored. Azure may discontinue
        the Beta feature at any time and for any reason.</p>\\n<p><span style=\\\"text-transform:
        uppercase;\\\">YOU ACKNOWLEDGE THAT YOUR USE OF TRADEMARK KEEPER DOES NOT
        RESULT IN AN \u201COFFICIAL\u201D TRADEMARK REGISTRATION WITH A GOVERNMENTAL
        TRADEMARK OFFICE. YOU ACKNOWLEDGE THAT TRADEMARK KEEPER IS NOT A LEGAL SERVICE
        AND YOU SHOULD CONSULT A TRADEMARK ATTORNEY FOR ADVICE ON HOW TO BEST PROTECT
        YOUR TRADEMARK RIGHTS. Azure MAKES NO REPRESENTATIONS OR WARRANTIES WITH REGARDS
        TO ANY MATTER INCLUDING THE ADMISSIBILITY OF THE SCREEN CAPTURES OR RECORDS
        CAPTURED THROUGH TRADEMARK KEEPER.</span></p>\\n</p>\\n        <strong><strong>12.
        PRE-REGISTRATIONS</strong></strong>\\n\\n      <p>If you submit an application
        for pre-registration of a domain name, Azure does not guarantee that the name
        will be secured for you, or that you will have immediate access to the domain
        name if secured.  Azure may use third-party service providers for the pre-registration
        services.</p>\\n        <strong><strong>13. PROVISIONS SPECIFIC TO .BIZ REGISTRATIONS</strong></strong>\\n\\n
        \     <p><u><em>Domain Name Dispute Policy</em></u>.  If you reserved or registered
        a .BIZ domain name through us, in addition to our Dispute Resolution Policy,
        you hereby acknowledge that you have read and understood and agree to be bound
        by the terms and conditions of the <a href=\\\"https://www.icann.org/resources/pages/rdrp-2012-02-25-en\\\">Restrictions
        Dispute Resolution Policy</a> applicable to the .biz TLD.</p>\\n      <p>The
        RDRP sets forth the terms under which any allegation that a domain name is
        not used primarily for business or commercial purposes shall be enforced on
        a case-by-case basis by an independent ICANN-accredited dispute provider.
        Registry Operator will not review, monitor, or otherwise verify that any particular
        domain name is being used primarily for business or commercial purposes or
        that a domain name is being used in compliance with the SUDRP or UDRP processes.</p>\\n
        \     <p><u><em>One Year Registration</em></u>.  If you are registering a
        .BIZ domain name and you elect to take advantage of special pricing applicable
        to one-year registrations, we will automatically renew your domain name for
        an additional one-year period at the end of the first year term by taking
        payment from the Payment Method you have on file, unless you notify us that
        you do not wish to renew. You will be notified and given the opportunity to
        accept or decline the one-year renewal prior to your domain name expiration
        date. In the event you decide not to renew your one-year .BIZ domain name
        for a second year, your domain name registration will automatically revert
        back to us and we will gain full rights of registration to such domain name.
        You agree that if you delete or transfer your .BIZ domain name during the
        first year, you will automatically be charged the second year renewal fees.</p>\\n
        \       <strong><strong>14. PROVISIONS SPECIFIC TO .INFO REGISTRATIONS</strong></strong>\\n\\n
        \     <p><u><em>One Year Registration</em></u>.  If you are registering a
        .INFO domain name and you elect to take advantage of special pricing applicable
        to one-year registrations, we will automatically renew your domain name for
        an additional one-year period at the end of the first year term by taking
        payment from the Payment Method you have on file, unless you notify us that
        you do not wish to renew. You will be notified and given the opportunity to
        accept or decline the one-year renewal prior to your domain name expiration
        date. In the event you decide not to renew your one-year .INFO domain name
        for a second year, your domain name registration will automatically revert
        back to us and we will gain full rights of registration to such domain name.
        You agree that if you delete or transfer your .INFO domain name during the
        first year, you will automatically be charged the second year renewal fees.</p>\\n
        \       <strong><strong>15. PROVISIONS SPECIFIC TO .NAME REGISTRATIONS</strong></strong>\\n\\n
        \     <p><u><em>Defensive Registration</em></u>.  A Defensive Registration
        is a registration designed for the protection of trademarks and service marks
        and may be granted to prevent a third party from registering a variation of
        a trademark or the exact trademark. If the name you wish to register is subject
        to a Defensive Registration, you have three (3) options: (i) you may register
        a variation of the name, (ii) you may challenge the Defensive Registration
        under the <a href=\\\"https://www.icann.org/resources/pages/erdrp-2012-02-25-en\\\">Eligibility
        Requirements Dispute Resolution Policy</a>, or (iii) you may request Consent
        from the Defensive Registrant. You can request Consent by contacting the Defensive
        Registrant listed in the GNR Whois Directory and requesting consent to register
        the .NAME domain name. If the Defensive Registrant grants consent, they must
        confirm in writing that they grant consent. If the Defensive Registrant does
        not grant consent, you may wish to challenge the Defensive Registration under
        the ERDRP.</p>\\n      <p><u><em>Acceptable Use Policy</em></u>.  You agree
        to be bound by the <a href=\\\"https://www.verisign.com/assets/name-acceptable-use-policy.pdf?inc=www.verisigninc.com\\\">.NAME
        Acceptable Use Policy</a>, which is hereby incorporated by reference. Among
        other limitations, this policy prohibits you from using your .NAME Email to
        engage in Spamming activities. You will be limited to a maximum of five hundred
        (500) messages sent from your .NAME at a time.</p>\\n        <strong><strong>16.
        PROVISIONS SPECIFIC TO .REISE REGISTRATIONS</strong></strong>\\n\\n      <p>Domain
        Names registered in .REISE should be used for purposes dedicated to travel
        topics within six months following initial Registration, e.g. utilized on
        the Internet or otherwise used to perform a function.</p>\\n        <strong><strong>17.
        PROVISIONS SPECIFIC TO .SEXY REGISTRATIONS</strong></strong>\\n\\n      <p>You
        shall not permit content unsuitable for viewing by a minor to be viewed from
        the main or top-level directory of a .SEXY domain name. For purposes of clarity,
        content viewed at the main or top-level directory of a .SEXY domain name is
        the content immediately visible if a user navigates to http://example.sexy
        or http://www.example.sexy. No restrictions apply to the content at any other
        page or subdirectory addressed by a .SEXY Registered Name. </p>\\n        <strong><strong>18.
        COUNTRY CODE TOP LEVEL DOMAINS</strong></strong>\\n\\n      <p><p>You represent
        and warrant that you meet the eligibility requirements of each ccTLD you apply
        for. You further agree to be bound by any registry rules, policies, and agreements
        for that particular ccTLD. These may include, but are not limited to, agreeing
        to indemnify the ccTLD provider, limiting the liability of the ccTLD provider,
        and requirements that any disputes be resolved under that particular country's
        laws.</p>\\n<p><strong><em>(A) PROVISIONS SPECIFIC TO .AU REGISTRATIONS</em></strong><br
        />\\n.au Registrations (to include .au, com.au, net.au and org.au) are governed
        by the following additional terms and conditions:</p>\\n<p><u>auDA</u>.  auDA
        means .au Domain Administration Limited ACN 079 009 340, the .au domain names
        administrator.  The Registrar acts as agent for auDA for the sole purpose,
        but only to the extent necessary, to enable auDA to receive the benefit of
        rights and covenants conferred to it under this Agreement. auDA is an intended
        third party beneficiary of this agreement.<br />\\n<br />\\n<u>auDA Published
        Policy</u>.  auDA Published Policies means those specifications and policies
        established and published by auDA from time to time at <a href=\\\"https://www.auda.org.au\\\">https://www.auda.org.au</a>.
        \ You must comply with all auDA Published Policies, as if they were incorporated
        into, and form part of, this Agreement. In the event of any inconsistency
        between any auDA Published Policy and this Agreement, then the auDA Published
        Policy will prevail to the extent of such inconsistency.  You acknowledge
        that under the auDA Published Policies: (1) there are mandatory terms and
        conditions that apply to all domain names; (2) licences, and such terms and
        conditions are incorporated into, and form part of, this Agreement; (3) You
        are bound by, and must submit to, the .au Dispute Resolution Policy; and (4)
        auDA may delete or cancel the registration of a .au domain name. <br />\\n<br
        />\\n<u>auDA's Liabilities and Indemnity</u>.  To the fullest extent permitted
        by law, auDA will not be liable to Registrant for any direct, indirect, consequential,
        special, punitive or exemplary losses or damages of any kind (including, without
        limitation, loss of use, loss or profit, loss or corruption of data, business
        interruption or indirect costs) suffered by Registrant arising from, as a
        result of, or otherwise in connection with, any act or omission whatsoever
        of auDA, its employees, agents or contractors. Registrant agrees to indemnify,
        keep indemnified and hold auDA, its employees, agents and contractors harmless
        from all and any claims or liabilities, arising from, as a result of, or otherwise
        in connection with, Registrant's registration or use of its .au domain name.
        Nothing in this document is intended to exclude the operation of Trade Practices
        Act 1974.</p>\\n</p>\\n      <p><p><strong><em>(B) PROVISIONS SPECIFIC TO
        .CA REGISTRATIONS</em></strong><br />\\nYou acknowledge and agree that registration
        of your selected domain name in your first application to CIRA shall not be
        effective until you have entered into and agreed to be bound by CIRA's Registrant
        Agreement. <br />\\n<br />\\n<u><em>CIRA Certified Registrar</em></u>.  The
        registrar shall immediately give notice to you in the event that it is no
        longer a CIRA Certified Registrar, has had its certification as a CIRA Certified
        Registrar suspended or terminated, or the Registrar Agreement between CIRA
        and the Registrar is terminated or expires. CIRA may post notice of such suspension,
        termination, or expiry on its website and may, if CIRA deems appropriate,
        give notice to the registrants thereof. In the event that the registrar is
        no longer a CIRA Certified Registrar, has had its certification as a CIRA
        Certified Registrar suspended or terminated or in the event the Registrar
        Agreement between CIRA and the Registrar is terminated or expires, you shall
        be responsible for changing your Registrar of Record to a new CIRA Certified
        Registrar within thirty (30) days of the earlier of notice thereof being given
        to you by (i) the Registrar or (ii) CIRA in accordance with CIRA's then current
        Registry PRP; provided, however, that if any of your domain name registrations
        are scheduled to expire within thirty (30) days of the giving of such notice,
        then you shall have thirty (30) days from the anniversary date of the registration(s),
        to register with a new CIRA certified registrar and to renew such domain name
        registration(s) in accordance with the Registry PRP.<br />\\n<br />\\nYou
        acknowledge and agree that should there be insufficient funds prepaid by the
        registrar in the CIRA Deposit Account to be applied in payment of any fees,
        CIRA may in its sole discretion stop accepting applications for domain name
        registrations from the registrar, stop effecting registrations of domain names
        and transfers, renewals, modifications, and cancellations requested by the
        registrar and stop performing other billable transactions requested by the
        registrar not paid in full and CIRA may terminate the Registrar Agreement
        between CIRA and the Registrar.<br />\\n<br />\\n<u><em>.CA ASCII and IDN
        domain variants</em></u> are bundled and reserved for a single registrant.
        \ Registrants are not required to register all variants in a bundle, but all
        registered variants must be registered and managed at a single registrar.
        Each variant registered will incur a registration fee.  In addition, when
        registering multiple .CA domain (ASCII and IDN) variants in a bundle, your
        registrant information <strong><em>must be identical</em></strong>.  If variants
        are registered at other registrars or if registrant information does not match,
        it may result in an &quot;unavailable&quot; search result, delayed or failed
        registration. If information does not match, validation is required and may
        take up to seven business days and delay availability of domain.</p>\\n</p>\\n
        \     <p><p><strong><em>(C) PROVISIONS SPECIFIC TO .CN REGISTRATIONS</em></strong><br
        />\\n.CN is a restricted TLD \u2013 applications are subject to both a domain
        name check <strong><em>and</em></strong> real name verification as required
        by the People\u2019s Republic of China.  Registrations in .CN are therefore
        subject to the following additional terms:</p>\\n<p><u><em>Verification, Registration
        and Activation</em></u>.  If a domain name is not permitted to be registered
        by the Chinese government, as determined by us, the Registry Operator and/or
        a 3rd party provider utilized for such services and determinations, in either
        party\u2019s discretion, the application for registration will not be successful.
        \ In such event, the name will be deleted and you will be eligible for a refund
        as further described below.</p>\\n<p>If permitted, then the Registration may
        proceed, but a .CN domain name may not be activated (i.e., it will not resolve
        in the Internet) <u><em>unless and until</em></u> you have submitted (via
        the process described during registration) valid documents required of us
        and the Registry to perform real name verification.  The following are acceptable
        forms of documents for the purpose of verification:\\r\\n</p>\\n<ul><li>China:
        Resident ID, temporary resident ID, business license or organization code
        certificate</li>\\r\\n\\r\\n<li>Hong Kong/Macau: Resident ID, driver\u2019s
        license, passport or business license</li>\\r\\n\\r\\n<li>Singapore: Driver\u2019s
        license, passport or business license</li>\\r\\n\\r\\n<li>Taiwan: Resident
        ID, driver\u2019s license or business license</li>\\r\\n\\r\\n<li>Other Countries/Regions:
        Driver\u2019s license or passport</li></ul>\\r\\n<p>Documents submitted to
        us are used by us and shared with the Registry solely for the purpose of real
        name verification, and are otherwise subject to our <a href=\\\"https://www.secureserver.net/legal/agreements/privacy-policy?prog_id=510456&pl_id=510456&plid=510456\\\">Privacy
        Policy</a>.  By registering a .CN domain, you expressly agree that your data
        may be stored on servers in the U.S., or otherwise outside of the People's
        Republic of China.</p>\\n<p><u><em>Refunds</em></u>.  Refunds for .CN Registrations
        will only be allowed where (i) registration of the applied for domain name
        is not permitted by the Chinese government; or (ii) you notify us of your
        intent to cancel for any reason within the first five (5) days after the Registration
        (i.e., after it is deemed permissible by the Chinese government).  For the
        avoidance of doubt, refunds will not be permitted under any circumstances
        after five (5) days from the date of Registration, including, for example,
        in the event real name verification is not successful or if the Chinese government
        determines after Registration that the domain name should not have been registered
        (and directs us to delete).</p>\\n</p>\\n      <p><p><strong><em>(D) PROVISIONS
        SPECIFIC TO .JP REGISTRATIONS</em></strong>  <br />\\n<u><em>Registration
        Restrictions</em></u>.  You represent and warrant that you have a local presence
        in Japan with a home or office address. You agree that certain domain names
        are reserved and can only be registered by certain parties. These include:
        (i) TLDs, other than ccTLDs, as determined by ICANN; (ii) geographical-type
        .JP domain names that are defined as metropolitan, prefectural, and municipal
        labels; (iii) names of primary and secondary educational organizations; (iv)
        names of organizations related to Internet management; (v) names required
        for .JP domain name operations; and (vi) character strings which may be confused
        with ASCII-converted Japanese domain names. The complete list of .JP Reserved
        Domains is available <a href=\\\"https://www.nic.ad.jp/dotjp/doc/dotjp-reserved.html\\\">here</a>.
        </p>\\n</p>\\n        <strong><strong>19. PROVISIONS SPECIFIC TO LEASE TO
        OWN</strong></strong>\\n\\n      <p><p>The following additional Terms apply
        with respect to Lease to Own Services (the \u201CLTO Services\u201D) provided
        by Azure, to you.</p>\\n<p><strong>(A) Definitions:</strong></p>\\n<ul>\\n<li><strong>LTO
        Domain</strong>: a domain name that you purchase from Azure through the Site
        with an agreement to pay over time.</li>\\n<li><strong>LTO Term</strong>:
        the period agreed between Azure and Buyer during which Buyer will have access
        to the DNS and will make monthly payments to Azure.</li>\\n<li><strong>Service
        Fee</strong>: fee owed by Buyer to Azure for the Services provided by Azure
        during the LTO Term, including, but not limited to, renewing the LTO Domain,
        providing administrative services related to the management of the LTO Domain,
        forwarding correspondence, etc.</li>\\n</ul>\\n</p>\\n      <p><p><strong>(B)
        Description of Services.</strong> </p>\\n<p>The LTO Services are provided
        to facilitate the buying and selling of currently registered domain names
        through payments over time, and not the purchase or sale of associated website
        content.</p>\\n<p>As Buyer, you agree to purchase the LTO Domain from Azure.
        During the LTO Term, Azure will make the DNS for the LTO Domain available
        to Buyer. You are required to deposit the mutually agreed-upon price and Buyer\u2019s
        Service Fee, as established by Azure, as soon as practical after you agree
        to the purchase price, but in no event later than five (5) business days.
        At no time will Buyer be able to withdraw those funds or send the funds to
        another recipient unless the initial transaction is cancelled. You agree that
        Azure is not responsible for breach of contract based upon a failure to transfer
        the LTO Domain to Buyer after the first payment is deposited. In the event
        that Azure is unable to make the LTO Domain Name DNS available to Buyer after
        the first installment payment, Azure shall return any funds provided by buyer
        for the purchase of the LTO Domain Name as soon as commercially reasonably
        possible.</p>\\n</p>\\n      <p><p><strong>(C) Fees and Payment.</strong></p>\\n<p>You
        are responsible for paying the monthly payment related to your LTO Domain
        plus any applicable Service Fee.</p>\\n<p>Any commissions may be subtracted
        from the payment, instalment payment or rental payment and, if these payments
        are not sufficient, from the subsequent payments. In the event that the domain
        name is purchased in instalments or rented, the commission subtracted will
        be limited to the secured instalment or rent payment (e.g.: if the commission
        is 25%, and the instalment price $100, the Azure only subtracts $25 from the
        payout of the Seller for each instalment.)</p>\\n</p>\\n      <p><p><strong>(D)
        Your Additional Obligations.</strong></p>\\n<ol><li>Buyer agrees to use the
        LTO Domain only in accordance with any applicable laws and/or regulations,
        and with all duty and care. For the avoidance of doubt, Buyer is prohibited
        from using the LTO Domain in a manner (as determined by Azure in its sole
        and absolute discretion) that:<ol type=a><li>in breach of any applicable law,
        statute, or regulation;</li><li>is fraudulent, criminal or unlawful;</li><li>promotes
        racism, bigotry, hatred or physical harm of any kind against any group or
        individual;</li><li>infringes or breaches the patent, copyright, trademark,
        trade secret, right of publicity or other intellectual property) rights of
        any third party;</li><li>contains video, audio photographs, or images of another
        person without his or her permission (or in the case of a minor, the minor's
        legal guardian\u2019s permission);</li><li>provides information on any illegal
        activity (including, but not limited to, instructional information on acquiring
        or fabricating illegal weapons or drugs, privacy violations or distributing
        computer viruses);</li><li>publicizes or promotes commercial activities an/or
        sales without our prior written consent such as contests, sweepstakes, barter,
        advertising, and pyramid schemes; or</li><li>involves the use, delivery or
        transmission of any viruses, harmful code, unsolicited emails, Trojan horses
        or any other computer programming routines that are intended to disrupt, damage,
        detrimentally interfere with, surreptitiously intercept or expropriate any
        system, data or personal information.</li></ol></li><li>Buyer acknowledges
        and agrees not to engage in any activity with the LTO Domain or using the
        LTO Services that would decrease the value of the LTO Domain. Such activities
        include, but are not limited to, the use of aggressive SEO strategies, techniques
        and tactics that focus only on search engines and not a human audience, and
        usually does not obey search engines guidelines (black hat SEO), such as keyword
        stuffing, invisible text, doorway pages, adding unrelated keywords to the
        page content or page swapping (changing the webpage entirely after it has
        been ranked by search engines), and the use of the domain name for spam activities.</li><li>Buyer
        may not grant any third party any rights to the LTO Domain, including any
        right to use the LTO Domain.</li><li>\\tBuyer agrees to protect, defend, indemnity
        and hold harmless Azure and its officers, directors, employees, agents and
        third party service providers from and against any and all claims, demands,
        costs, expenses, losses liabilities and damages of every kind and nature (including,
        without limitation, reasonable attorneys\u2019 fees) imposed upon or incurred
        by Azure directly or indirectly arising from (i) your use of the LTO Services;
        (ii) your violation(s) of any provision of this Agreement; and/or (iii) your
        violation of any third party right, including without limitation any intellectual
        property or other proprietary right. This indemnification obligation shall
        survive any termination or expiration of this Agreement or your use of the
        LTO Services.</li></ol>\\r\\n</p>\\n      <p><p><strong>E. Azure\u2019s Rights.</strong></p>\\n<ol><li>Azure
        may terminate your use of the LTO Services for any violation or breach of
        any of the terms of this Agreement by you. Any such termination will not entitle
        you to any refund of payments already made to Azure for any LTO Services or
        Service Fee, and you will lose any and all access to the applicable LTO Domain.</li><li>If
        the LTO Services are terminated, Azure reserves the right to sell the LTO
        Domain to any party, including potential competitors of Buyer. Azure shall
        have no ongoing obligation to Buyer related to the LTO Domain.</li><li>The
        parties acknowledge and agree that the Azure is not a payment provider and
        that Azure does not make any warranties in that respect. In order to effectuate
        the transfer of payments, Azure uses the services of a third party payment
        provider. The terms and conditions of the third party payment provider shall
        apply to such payments.</li></ol>\\r\\n</p>\\n      <p><p><strong>F. Remedies
        and Right to Cancel.</strong></p>\\n<p>Without limiting any other remedies
        available to Azure, if:</p>\\n<ol type=A><li>You breach this Agreement, or
        any document incorporated by reference;</li><li>Azure determines your actions
        may pose a risk to Azure or its members;</li><li>Azure determines your use
        of the Services infringes on the intellectual property or legal rights of
        others.</li></ol>\\r\\n<p>Azure may immediately:</p>\\n<ol type=i><li>Warn
        its members of your actions;</li><li>Place a hold on any pending transactions
        associated with your account(s);</li><li>Limit funding sources and payments;</li><li>Limit
        your access to your account(s) or to any functionality of your account(s);
        or</li><li>Indefinitely suspend or close your account(s) and refuse to provide
        our Services to you.</li></ol><p></li></ol></p>\\n<p>In addition, Azure reserves
        the right to hold funds beyond normal distribution periods for transactions
        it deems suspicious or for account(s) conducting high transaction volumes
        to ensure integrity of the funds. If Azure closes your account(s), Azure will
        provide notice and pay you all of the unrestricted funds in your account(s)
        due to you.</p>\\n</p>\\n</div>\\n\",\"url\":\"http://www.secureserver.net/agreements/ShowDoc.aspx?pageid=reg_sa&pl_id=510456\"},{\"agreementKey\":\"DNPA\",\"title\":\"Domains
        by Proxy Agreement\",\"content\":\"\\n<style>.vsc-legal-content-module .lcm-title{margin-top:2.5rem;margin-bottom:1rem}.vsc-legal-content-module
        .lcm-subtitle{margin-bottom:1rem}.vsc-legal-content-module .paragraph{margin-top:0;margin-bottom:1rem}.vsc-legal-content-module
        .lcm-numbered-list ul>ol{list-style:circle inside}.vsc-legal-content-module
        .lcm-numbered-list ol{counter-reset:section;padding-left:0}.vsc-legal-content-module
        .lcm-numbered-list ol>li{display:block}.vsc-legal-content-module .lcm-numbered-list
        ol>li:before{content:counters(section,\\\".\\\") \\\" \\\";counter-increment:section}</style>\\n\\n<div
        id=\\\"id-fc86ff53-d1e8-4ffa-8551-77fd27f0b3ce\\\" class=\\\"vsc-legal-content-module\\\"
        >\\n  <div class=\\\"lcm-title\\\">\\n    <span class=\\\"h5\\\">Azure - DOMAIN
        NAME PROXY AGREEMENT</span>\\n  </div>\\n    <div class=\\\"lcm-subtitle\\\">\\n
        \     Last Revised:  9/26/2023\\n    </div>\\n\\n  <p><p>PLEASE READ THIS
        AGREEMENT CAREFULLY, AS IT CONTAINS IMPORTANT INFORMATION REGARDING YOUR LEGAL
        RIGHTS AND REMEDIES. </p>\\n<p>The Universal Terms of Service Agreement sets
        forth the general terms and conditions of your use of the Site and the Services.
        This Domain Name Proxy Agreement (this \u201C<strong>Service Agreement</strong>\u201D)
        governs your use of Azure\u2019s domain privacy related services (\u201C<strong>DBP
        Services</strong>\u201D). Capitalized terms used in this Service Agreement,
        but not defined, are defined in the Universal Terms of Service Agreement.
        </p>\\n<p>You further agree to abide by the terms and conditions promulgated
        by the Internet Corporation for Assigned Names and Numbers (&quot;ICANN&quot;)
        (including the Uniform Domain Name Dispute Resolution Policy (&quot;<strong>Dispute
        Resolution Policy</strong>&quot;) and Your Registrar (i.e., the ICANN-accredited
        person or entity through which You register a domain name).</p>\\n</p>\\n
        \       <strong><strong>1. <span style=\\\"text-transform:uppercase;\\\">Description
        of Azure's Private Registration Services</span></strong> </strong>\\n\\n  <p><p>When
        You subscribe to Azure's private registration service through a Azure-affiliated
        Registrar, Azure will display its contact information in the publicly available
        &quot;Whois&quot; directory in place of Your information. Azure shall keep
        Your name, postal address, email address, phone and fax numbers confidential,
        subject to Section 4 of this Agreement. The following information (and not
        Your personal information) will be made publicly available in the &quot;Whois&quot;
        directory as determined by ICANN policy:  \\r</p>\\n<ol type=i>\\r\\n<li>Azure's
        name as the proxy Registrant of the domain name and a proxy email address,
        phone number and postal address for the proxy Registrant's contact information;</li>
        \ \\r\\n<li>A proxy postal address and phone number for the domain name registration's
        technical contact;</li>  \\r\\n<li>A proxy email address, postal address and
        phone number for the domain name registration's administrative contact;</li>
        \ \\r\\n<li>A proxy email address, postal address and phone number for the
        domain's name registration's billing contact;</li>  \\r\\n<li>The primary
        and secondary domain name servers You designate for the domain name;</li>
        \ \\r\\n<li>The domain name's original date of registration and expiration
        date of the registration; and</li>  \\r\\n<li>The identity of the Registrar.</li>\\r\\n</ol>\\r\\n</p>\\n
        \       <strong><strong>2 . FULL BENEFITS OF COMAIN REGISTRATION RETAINED
        BY YOU</strong> </strong>\\n\\n  <p><p>Although Azure will show in the &quot;Whois&quot;
        directory as the Registrant of each domain name registration You designate,
        You will retain the full benefits of domain name registration with respect
        to each such domain name registration, including, subject to Section 4 below:
        </p>\\n<ol type=i>\\r\\n<li>The right to sell, transfer or assign each domain
        name registration, which shall require cancellation of the DBP Services associated
        with each such domain name registration;</li>  \\r\\n<li>The right to control
        the use of each domain name registration, including designating the primary
        and secondary domain name servers to which each domain name points;</li>  \\r\\n<li>The
        right to cancel each domain name registration;</li>  \\r\\n<li>The right to
        cancel the DBP Services associated with each domain name registration and/or
        Your privacy services with Azureso that Your contract information is listed
        in the \\\"Whois\\\" directory; and</li>   \\r\\n<li>The right to renew each
        domain name registration upon its expiration, subject to Your Registrar's
        applicable rules and policies.</li>\\r\\n</ol>\\r\\n</p>\\n        <strong><strong>3
        . PERSONAL INFORMATION AND YOUR NOTIFICATION OBLIGATIONS; REPRESENTATION AND
        WARRANTIES; ACCOUNT SECURITY</strong> </strong>\\n\\n      <p><p><strong>Personal
        Information and Your Notification Obligations</strong>  \\r</p>\\n<p>You agree
        that for each domain name for which you use DBP Services, You will provide
        accurate and current information as to:  \\r</p>\\n<ol type=i><li>Your name,
        the email address, postal address, phone and fax numbers for the domain name
        registration's Registrant contact;</li><li>The email address, postal address,
        phone and fax numbers for the domain name registration's technical contact;</li><li>The
