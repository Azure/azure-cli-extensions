      string: "{\"value\":[{\"agreementKey\":\"DNRA\",\"title\":\"Domain Registration
        Agreement\",\"content\":\"\\n<style>.vsc-legal-content-module .lcm-title{margin-top:2.5rem;margin-bottom:1rem}.vsc-legal-content-module
