        may give You notice via first class or certified mail, return receipt requested.
        All notices from You to Azure shall be sent via certified mail, return receipt
        requested or traceable courier to:  \\r</p>\\n<p>Domains By Proxy, LLC<br
        />\\nAttn: General Counsel<br />\\n2150 E. Warner Rd.<br />\\nTempe, AZ 85284
        USA</p>\\n<p>Notices sent via certified mail or traceable courier shall be
        deemed effective five (5) days after the date of mailing.  </p>\\n</p>\\n
        \     <p><p><strong>d. Insurance</strong>  <br />\\n<br />\\nIn the unlikely
