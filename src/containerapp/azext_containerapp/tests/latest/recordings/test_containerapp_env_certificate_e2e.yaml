        fax numbers for the domain name registration's billing contact; and</li><li>You
        agree to provide government issued photo identification and/or government
        issued business identification as required for verification of identity when
        requested.</li></ol>\\r\\n<p><strong>You agree to:</strong>  \\r</p>\\n<ol
        type=i><li>Notify Azurewithin three (3) calendar days when any of the personal
